<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central NewEnergy - Admin</title>
    <!-- Tailwind CSS para um design limpo e moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase App e Database (SDK v9 Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 shadow-sm flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">CENTRAL NEWENERGY</h1>
            <p class="text-sm text-blue-600 font-medium">Monitoramento Geral de Infraestrutura Ativa</p>
        </div>
        <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end">
            <div id="status-conexao" class="text-sm text-slate-500 font-medium flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-amber-500 animate-pulse"></span>
                Sincronizando servidores...
            </div>
            <!-- Botão de Adicionar Sensor -->
            <button onclick="abrirModalCadastro()" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-xl text-sm transition-all shadow-sm">
                <span class="text-lg leading-none">+</span> Novo Sensor
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto p-6">
        <div id="grid-sensores" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Os cards dos sensores serão injetados dinamicamente aqui -->
        </div>
    </main>

    <!-- ======================================================= -->
    <!-- MODAL DE CADASTRO DE NOVO SENSOR                        -->
    <!-- ======================================================= -->
    <div id="modal-cadastro" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-6 border border-slate-100">
            <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
                <h2 class="text-lg font-bold text-slate-800">Cadastrar Novo Dispositivo</h2>
                <button onclick="fecharModalCadastro()" class="text-slate-400 hover:text-slate-600 font-semibold text-sm">
                    Cancelar
                </button>
            </div>

            <form id="form-cadastro" onsubmit="salvarNovoSensor(event)" class="space-y-4">
                <!-- ID do Sensor (Chave no Firebase) -->
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 tracking-wider mb-1">ID Único do Sensor (Ex: SENSOR_02)</label>
                    <input type="text" id="cad-id" required placeholder="SENSOR_02" 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono">
                </div>

                <!-- Nome do Local -->
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 tracking-wider mb-1">Local / Equipamento (Ex: ELEKTA - PRECISE)</label>
                    <input type="text" id="cad-nome" required placeholder="ELEKTA - PRECISE" 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Nome do Cliente -->
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 tracking-wider mb-1">Nome do Cliente (Ex: FUNDAÇÃO JORGE DINO)</label>
                    <input type="text" id="cad-cliente" required placeholder="FUNDAÇÃO JORGE DINO" 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <!-- Rota da Temperatura -->
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 tracking-wider mb-1">Rota de Temperatura no DB (Ex: sensores/SENSOR_02/temperatura)</label>
                    <input type="text" id="cad-rota-temp" required placeholder="sensores/SENSOR_02/temperatura" 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono">
                </div>

                <!-- Rota da Umidade -->
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 tracking-wider mb-1">Rota de Umidade no DB (Ex: sensores/SENSOR_02/umidade)</label>
                    <input type="text" id="cad-rota-hum" required placeholder="sensores/SENSOR_02/umidade" 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono">
                </div>

                <!-- Rota do Last Seen (Sinal de Vida) -->
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 tracking-wider mb-1">Rota do Last Seen (Ex: sensores/SENSOR_02/timestamp)</label>
                    <input type="text" id="cad-rota-seen" required placeholder="sensores/SENSOR_02/timestamp" 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono">
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider transition-all shadow-md">
                        Salvar e Iniciar Monitoramento
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 1. Configuração do seu Firebase (Mantendo as credenciais padrão do seu projeto)
        const firebaseConfig = {
            databaseURL: "https://oficial-688e8-default-rtdb.firebaseio.com"
        };

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Elementos da Tela
        const gridSensores = document.getElementById('grid-sensores');
        const statusConexao = document.getElementById('status-conexao');
        const modalCadastro = document.getElementById('modal-cadastro');
        const formCadastro = document.getElementById('form-cadastro');

        // Função para calcular se o sensor está online (limite de 1 minuto / 60000ms)
        function verificarOnline(lastSeenTimestamp) {
            if (!lastSeenTimestamp) return false;
            const agora = Date.now();
            const diferenca = agora - (lastSeenTimestamp * 1000); // Se o last_seen estiver em segundos, multiplica por 1000
            return diferenca < 60000; 
        }

        // 2. Ouvinte em tempo real para a lista de sensores cadastrados
        db.ref('central_sensores').on('value', (snapshot) => {
            if (!snapshot.exists()) {
                gridSensores.innerHTML = `<p class="text-slate-500 col-span-full text-center py-12">Nenhum sensor cadastrado no sistema.</p>`;
                statusConexao.innerHTML = `<span class="w-2.5 h-2.5 rounded-full bg-slate-400"></span> Sem dados`;
                return;
            }

            statusConexao.innerHTML = `<span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span> Conectado ao Firebase`;
            gridSensores.innerHTML = ''; // Limpa o grid para reconstruir

            snapshot.forEach((childSnapshot) => {
                const sensorKey = childSnapshot.key; // Ex: "sensor_01"
                const sensorConf = childSnapshot.val(); // Contém nome, rotaTemp, rotaHum, rotaLastSeen, clientID

                // Cria o elemento do Card na tela com valores iniciais de carregamento
                const cardHtml = `
                    <div id="card-${sensorKey}" class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 hover:shadow-md transition-shadow">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-xs font-bold uppercase tracking-wider text-slate-400">ID: ${sensorKey}</span>
                                <h3 class="text-lg font-bold text-slate-800 mt-0.5">${sensorConf.nome || 'Sensor Sem Nome'}</h3>
                                <p class="text-xs text-slate-500">Cliente: <span class="font-semibold text-slate-700">${sensorConf.clientID || 'Não Definido'}</span></p>
                            </div>
                            <span id="status-badge-${sensorKey}" class="px-2.5 py-1 rounded-full text-xs font-bold bg-slate-100 text-slate-600">
                                Carregando...
                            </span>
                        </div>

                        <div class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-4">
                            <div class="bg-slate-50 rounded-lg p-3 text-center">
                                <span class="text-xs font-medium text-slate-500">Temperatura</span>
                                <div id="temp-${sensorKey}" class="text-2xl font-extrabold text-slate-800 mt-1">-- °C</div>
                            </div>
                            <div class="bg-slate-50 rounded-lg p-3 text-center">
                                <span class="text-xs font-medium text-slate-500">Umidade</span>
                                <div id="hum-${sensorKey}" class="text-2xl font-extrabold text-slate-800 mt-1">-- %</div>
                            </div>
                        </div>

                        <div class="mt-4 pt-3 border-t border-slate-100 flex justify-between items-center text-xs text-slate-400">
                            <span>Sinal do Dispositivo:</span>
                            <span id="lastseen-${sensorKey}" class="font-medium text-slate-600">--</span>
                        </div>
                    </div>
                `;
                
                gridSensores.insertAdjacentHTML('beforeend', cardHtml);

                // 3. Ouvintes dinâmicos que escutam as rotas reais apontadas no cadastro
                
                // Monitora a Temperatura em tempo real (Lógica inteligente para ler objetos/pastas ou valor direto)
                if (sensorConf.rotaTemp) {
                    db.ref(sensorConf.rotaTemp).on('value', (dataSnapshot) => {
                        const tempEl = document.getElementById(`temp-${sensorKey}`);
                        if (tempEl) {
                            const val = dataSnapshot.val();
                            if (val !== null) {
                                if (typeof val === 'object' && val.temp !== undefined) {
                                    tempEl.textContent = `${parseFloat(val.temp).toFixed(1)} °C`;
                                } else {
                                    tempEl.textContent = `${parseFloat(val).toFixed(1)} °C`;
                                }
                            } else {
                                tempEl.textContent = '-- °C';
                            }
                        }
                    });
                }

                // Monitora a Umidade em tempo real (Com a mesma proteção inteligente)
                if (sensorConf.rotaHum) {
                    db.ref(sensorConf.rotaHum).on('value', (dataSnapshot) => {
                        const humEl = document.getElementById(`hum-${sensorKey}`);
                        if (humEl) {
                            const val = dataSnapshot.val();
                            if (val !== null) {
                                if (typeof val === 'object' && val.hum !== undefined) {
                                    humEl.textContent = `${parseFloat(val.hum).toFixed(1)} %`;
                                } else {
                                    humEl.textContent = `${parseFloat(val).toFixed(1)} %`;
                                }
                            } else {
                                humEl.textContent = '-- %';
                            }
                        }
                    });
                }

                // Monitora o Last Seen e atualiza o status Online/Offline do sensor
                if (sensorConf.rotaLastSeen) {
                    db.ref(sensorConf.rotaLastSeen).on('value', (dataSnapshot) => {
                        const lastSeenVal = dataSnapshot.val();
                        const lastSeenEl = document.getElementById(`lastseen-${sensorKey}`);
                        const badgeEl = document.getElementById(`status-badge-${sensorKey}`);

                        if (lastSeenVal) {
                            // Atualiza a exibição da última hora vista
                            const data = new Date(lastSeenVal * 1000);
                            const horaFormatada = data.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                            if (lastSeenEl) lastSeenEl.textContent = horaFormatada;

                            // Função que executa a cada 10s para re-verificar se o sensor caiu
                            const atualizarStatusOnline = () => {
                                const isOnline = verificarOnline(lastSeenVal);
                                if (badgeEl) {
                                    if (isOnline) {
                                        badgeEl.className = "px-2.5 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700 animate-pulse";
                                        badgeEl.textContent = "ONLINE";
                                    } else {
                                        badgeEl.className = "px-2.5 py-1 rounded-full text-xs font-bold bg-rose-100 text-rose-700";
                                        badgeEl.textContent = "OFFLINE";
                                    }
                                }
                            };

                            atualizarStatusOnline();
                            // Deixa um timer rodando localmente para mudar para OFFLINE caso pare de atualizar
                            if (window[`timer_${sensorKey}`]) clearInterval(window[`timer_${sensorKey}`]);
                            window[`timer_${sensorKey}`] = setInterval(atualizarStatusOnline, 10000);
                        }
                    });
                }
            });
        }, (error) => {
            console.error("Erro ao ler dados do Firebase:", error);
            statusConexao.innerHTML = `<span class="w-2.5 h-2.5 rounded-full bg-rose-500"></span> Erro de Permissão`;
        });

        // =======================================================
        // FUNÇÕES PARA CADASTRO DE NOVO DISPOSITIVO
        // =======================================================

        function abrirModalCadastro() {
            modalCadastro.classList.remove('hidden');
        }

        function fecharModalCadastro() {
            modalCadastro.classList.add('hidden');
            formCadastro.reset(); // Limpa as entradas
        }

        function salvarNovoSensor(event) {
            event.preventDefault(); // Impede o recarregamento tradicional da página

            // Captura os valores digitados no formulário
            const idSensor = document.getElementById('cad-id').value.trim().toUpperCase().replace(/\s+/g, '_');
            const nomeLocal = document.getElementById('cad-nome').value.trim();
            const cliente = document.getElementById('cad-cliente').value.trim();
            const rotaTemp = document.getElementById('cad-rota-temp').value.trim();
            const rotaHum = document.getElementById('cad-rota-hum').value.trim();
            const rotaSeen = document.getElementById('cad-rota-seen').value.trim();

            // Monta o objeto de configuração idêntico à sua estrutura atual do Firebase
            const novoCadastro = {
                clientID: cliente,
                nome: nomeLocal,
                rotaHum: rotaHum,
                rotaLastSeen: rotaSeen,
                rotaTemp: rotaTemp
            };

            // Envia para o Firebase Realtime Database
            db.ref(`central_sensores/${idSensor}`).set(novoCadastro)
                .then(() => {
                    alert(`Sensor ${idSensor} cadastrado com sucesso!`);
                    fecharModalCadastro();
                })
                .catch((error) => {
                    console.error("Erro ao cadastrar novo dispositivo: ", error);
                    alert("Erro ao gravar no banco. Verifique suas regras de segurança ou conexão.");
                });
        }
    </script>
</body>
</html>
